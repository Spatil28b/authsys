<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="register-title">Register Page</h2>
        <form id="register-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password (min 6 characters)" required>
            <input type="password" id="password-confirm" placeholder="Confirm Password" required>
            <button type="submit" id="register-button" disabled>Register</button>
            <a href="index.html" id="login-link">Already have an account? Login</a>
        </form>
        <div id="message" class="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
