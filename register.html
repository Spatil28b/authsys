<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="register-title">Register Page</h2>
        <form id="register-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
                <span class="error-icon" title="Invalid email">✖</span>
            </div>
            <div class="form-group">
                <input type="text" id="username" placeholder="Username (min 3 characters)" required>
                <span class="error-icon" title="Username too short">✖</span>
            </div>
            <div class="form-group password-group">
                <input type="password" id="password" placeholder="Password (min 6 characters)" required>
                <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                <span class="error-icon" title="Weak password">✖</span>
            </div>
            <div id="password-strength" class="password-strength">
                <div class="strength-bar"><div class="strength-fill"></div></div>
                <span class="strength-text">Password strength: </span>
            </div>
            <div class="form-group password-group">
                <input type="password" id="password-confirm" placeholder="Confirm Password" required>
                <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                <span class="error-icon" title="Passwords don't match">✖</span>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the Terms & Conditions</label>
            </div>
            <button type="submit" id="register-button" disabled>Register</button>
            <div id="message" class="message"></div>
            <a href="index.html" id="login-link">Already have an account? Login</a>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
