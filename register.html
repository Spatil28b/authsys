<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <h2 id="login-title">Register Page</h2>
        <form id="login-form">

            
            <input type="text" id="username" placeholder="Username" required><br><br>
            <input type="password" id="password" placeholder="Password" required><br><br>
            <button type="submit" id="login-button" onclick="handleRegister()">Register</button>
            <a href="index.html" id="forgot-password">Already have an account?</a>
        </form>
    </div>
</body>
</html>
