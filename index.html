<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="login-title">Login Page</h2>
        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email or Username" required>
                <span class="error-icon" title="Invalid email">✖</span>
            </div>
            <div class="form-group password-group">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                <span class="error-icon" title="Password required">✖</span>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember me</label>
            </div>
            <button type="submit" id="login-button" disabled>Login</button>
            <div id="message" class="message"></div>
            <a href="register.html" id="register-link">Don't have an account? Register</a>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
